server {
    listen 80;

    # Serve the built Vite library bundle.
    # The shell fetches /remoteEntry.js to dynamically load this module.
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Allow cross-origin requests so the shell (on a different origin in dev) can load the bundle.
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods "GET, OPTIONS";
}
