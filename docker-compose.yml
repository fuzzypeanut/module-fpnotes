---
# FuzzyPeanut Notes Module — docker-compose.yml
#
# Bring up alongside your existing FuzzyPeanut stack:
#   docker compose -f ../deploy/docker-compose.dev.yml \
#                  -f docker-compose.yml up -d
#
# Required environment variables: see .env.example → copy to .env

name: fpnotes

services:

  # ── Frontend: nginx serving the compiled Svelte bundle ─────────────────────
  fpnotes-ui:
    build:
      context: ..              # Repo root so the Dockerfile can reach ../sdk
      dockerfile: module-fpnotes/Dockerfile
    restart: unless-stopped
    ports:
      - "${FPNOTES_UI_PORT:-4001}:80"
    networks:
      - fpnotes-net
      - fuzzypeanut_default    # Attach to the shell's network so the registry can reach us

  # ── API: Python FastAPI ─────────────────────────────────────────────────────
  fpnotes-api:
    build:
      context: ./api
    restart: unless-stopped
    ports:
      # The browser calls this directly. Default 4002; override with FPNOTES_API_PORT.
      - "${FPNOTES_API_PORT:-4002}:8080"
    environment:
      DATABASE_URL: "postgresql://notes:${FPNOTES_DB_PASSWORD:-changeme}@fpnotes-db:5432/notes"
      JWKS_URL: "${JWKS_URL}"
      PROVISIONING_SECRET: "${PROVISIONING_SECRET}"
      CORS_ORIGINS: "${VITE_NOTES_API_URL:-http://localhost:4001},http://localhost:3000"
    depends_on:
      fpnotes-db:
        condition: service_healthy
    networks:
      - fpnotes-net
      # Admin provisioning endpoint must NOT be exposed through nginx.
      # It is reachable internally by the provisioning service on this network.
      - fuzzypeanut_default

  # ── Database ────────────────────────────────────────────────────────────────
  fpnotes-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: notes
      POSTGRES_USER: notes
      POSTGRES_PASSWORD: "${FPNOTES_DB_PASSWORD:-changeme}"
    volumes:
      - fpnotes-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - fpnotes-net
    # No ports exposed — database is internal only.

  # ── Registrar: posts manifest.json to the shell registry on startup ─────────
  fpnotes-registrar:
    image: python:3.12-slim
    restart: on-failure
    working_dir: /app
    volumes:
      - ./registrar.py:/app/registrar.py:ro
      - ./manifest.json:/app/manifest.json:ro
    command: >
      sh -c "pip install httpx -q && python registrar.py"
    environment:
      REGISTRY_URL: "http://shell-registry:3100"
      MODULE_URL: "http://fpnotes-ui:80"
    depends_on:
      - fpnotes-ui
    networks:
      - fpnotes-net
      - fuzzypeanut_default

volumes:
  fpnotes-db-data:

networks:
  fpnotes-net:
    driver: bridge
  fuzzypeanut_default:
    external: true   # Must already exist (created by your main stack)
